name: Build dev client on label

on:
  pull_request:
    types: [labeled]

jobs:
  build-dev-client:
    name: Build development client
    if: github.event.label.name == 'build dev client'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove trigger label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --remove-label "build dev client"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock', 'patches/**', 'package.json') }}
      - name: Install dependencies
        run: yarn install

      - name: Build development client
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: yarn eas build --profile development --platform all --clear-cache --non-interactive

      - name: Get build URLs
        id: build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          IOS_URL=$(yarn eas build:list --build-profile development --platform ios --status finished --limit 1 --json --non-interactive 2>&1 \
            | sed -n '/^\[/,/^\]/p' \
            | jq -r '"https://expo.dev/accounts/" + .[0].project.ownerAccount.name + "/projects/" + .[0].project.slug + "/builds/" + .[0].id')
          ANDROID_URL=$(yarn eas build:list --build-profile development --platform android --status finished --limit 1 --json --non-interactive 2>&1 \
            | sed -n '/^\[/,/^\]/p' \
            | jq -r '"https://expo.dev/accounts/" + .[0].project.ownerAccount.name + "/projects/" + .[0].project.slug + "/builds/" + .[0].id')
          echo "ios_url=$IOS_URL" >> $GITHUB_OUTPUT
          echo "android_url=$ANDROID_URL" >> $GITHUB_OUTPUT

      - name: Comment build links on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IOS_URL: ${{ steps.build.outputs.ios_url }}
          ANDROID_URL: ${{ steps.build.outputs.android_url }}
        run: |
          COMMENT_BODY=$(printf '📱 **Development Build**\n- iOS: %s\n- Android: %s' "$IOS_URL" "$ANDROID_URL")
          EXISTING=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | startswith("📱 **Development Build**")) | .id' | tail -1)
          if [ -n "$EXISTING" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$EXISTING \
              -X PATCH -f body="$COMMENT_BODY"
          else
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body "$COMMENT_BODY"
          fi
