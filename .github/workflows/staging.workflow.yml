name: Staging deploy

on:
  push:
    branches:
      - staging
  workflow_dispatch:
    inputs:
      force_native_build:
        description: Force a native build instead of OTA update
        type: boolean
        default: false

jobs:
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}
      - name: Install dependencies
        run: yarn install

  typecheck:
    name: Run TypeScript typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}
      - name: Run tsc
        run: yarn tsc

  test:
    name: Run unit tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}
      - name: Run unit tests
        run: yarn jest --coverage=false --detectOpenHandles --forceExit

  detect-changes:
    name: Detect build type
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    outputs:
      needs_native_build: ${{ steps.set-output.outputs.needs_native_build }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            native:
              - 'ios/**'
              - 'android/**'
              - 'app.json'
              - 'app.config.*'
              - 'eas.json'
              - 'package.json'
              - 'yarn.lock'
      - name: Set build type output
        id: set-output
        run: |
          if [[ "${{ inputs.force_native_build }}" == "true" || "${{ steps.filter.outputs.native }}" == "true" ]]; then
            echo "needs_native_build=true" >> $GITHUB_OUTPUT
          else
            echo "needs_native_build=false" >> $GITHUB_OUTPUT
          fi

  deploy-ota:
    name: Deploy OTA update
    needs: detect-changes
    if: needs.detect-changes.outputs.needs_native_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}
      - name: Deploy OTA update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: yarn eas update --branch staging --non-interactive
      - name: Notify Rollbar of deploy
        run: |
          curl -s https://api.rollbar.com/api/1/deploy \
            -F access_token=${{ secrets.ROLLBAR_ACCESS_TOKEN }} \
            -F environment=staging \
            -F revision=${{ github.sha }} \
            -F local_username=${{ github.actor }}

  build-and-submit:
    name: Build preview for internal testing
    needs: detect-changes
    if: needs.detect-changes.outputs.needs_native_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock') }}
      - name: Build preview for all platforms
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: yarn eas build --profile preview --platform all --non-interactive
      - name: Notify Rollbar of deploy
        run: |
          curl -s https://api.rollbar.com/api/1/deploy \
            -F access_token=${{ secrets.ROLLBAR_ACCESS_TOKEN }} \
            -F environment=staging \
            -F revision=${{ github.sha }} \
            -F local_username=${{ github.actor }}
