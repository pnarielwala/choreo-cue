name: PR check

on:
  pull_request:

jobs:
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock', 'patches/**', 'package.json') }}
      - name: Install dependencies
        run: yarn install

  typecheck:
    name: Run TypeScript typecheck
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock', 'patches/**', 'package.json') }}
      - name: Run tsc
        run: yarn tsc

  test:
    name: Run unit tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock', 'patches/**', 'package.json') }}
      - name: Run unit tests
        run: yarn jest --coverage=false --detectOpenHandles --forceExit

  detect-fingerprint:
    name: Check if dev build needed
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      needs_native_build: ${{ steps.check.outputs.needs_native_build }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock', 'patches/**', 'package.json') }}
      - name: Generate fingerprint
        id: fingerprint
        env:
          APP_ENV: development
          EXPO_ROLLBAR_ACCESS_TOKEN: ${{ secrets.EXPO_ROLLBAR_ACCESS_TOKEN }}
          EXPO_SPOTIFY_CLIENT_ID: ${{ secrets.EXPO_SPOTIFY_CLIENT_ID }}
        run: |
          npx @expo/fingerprint fingerprint:generate --platform ios > fingerprint-ios.json
          IOS_HASH=$(jq -r '.hash' fingerprint-ios.json)
          echo "ios_hash=$IOS_HASH" >> $GITHUB_OUTPUT
      - name: Upload fingerprint artifact
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-ios-${{ github.sha }}
          path: fingerprint-ios.json
      - name: Check for existing builds
        id: check
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set +e
          IOS_BUILDS=$(yarn eas build:list \
            --fingerprint-hash ${{ steps.fingerprint.outputs.ios_hash }} \
            --build-profile development \
            --platform ios --status finished --limit 1 \
            --json --non-interactive 2>&1 | sed -n '/^\[/,/^\]/p' | jq 'length' 2>/dev/null)
          IOS_BUILDS=${IOS_BUILDS:-0}
          if [[ "$IOS_BUILDS" -eq 0 ]]; then
            echo "needs_native_build=true" >> $GITHUB_OUTPUT
          else
            echo "needs_native_build=false" >> $GITHUB_OUTPUT
          fi

  label-pr:
    name: Label PR if native build needed
    needs: detect-fingerprint
    if: needs.detect-fingerprint.outputs.needs_native_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Add native build label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label "native build"

  deploy-preview:
    name: Deploy preview update
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: actions/cache@v4
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-${{ hashFiles('**/yarn.lock', 'patches/**', 'package.json') }}
      - name: Capture deploy-time fingerprint
        env:
          APP_ENV: development
          EXPO_ROLLBAR_ACCESS_TOKEN: ${{ secrets.EXPO_ROLLBAR_ACCESS_TOKEN }}
          EXPO_SPOTIFY_CLIENT_ID: ${{ secrets.EXPO_SPOTIFY_CLIENT_ID }}
        run: npx @expo/fingerprint fingerprint:generate --platform ios > fingerprint-ios-deploy.json
      - name: Upload deploy-time fingerprint artifact
        uses: actions/upload-artifact@v4
        with:
          name: fingerprint-ios-deploy-${{ github.sha }}
          path: fingerprint-ios-deploy.json
      - name: Deploy EAS update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_ENV: development
          EXPO_ROLLBAR_ACCESS_TOKEN: ${{ secrets.EXPO_ROLLBAR_ACCESS_TOKEN }}
          EXPO_SPOTIFY_CLIENT_ID: ${{ secrets.EXPO_SPOTIFY_CLIENT_ID }}
        run: yarn eas update --branch ${{ github.head_ref }} --message "${{ github.event.pull_request.title }}" --non-interactive
